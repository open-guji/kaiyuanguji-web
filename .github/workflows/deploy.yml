name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  repository_dispatch:
    types: [ book-index-updated ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nextjs/package-lock.json

      - name: Install dependencies
        run: |
          cd nextjs
          npm install

      # --- 步骤 1：为 GitHub Pages 构建（github 模式） ---
      - name: Build for GitHub Pages
        run: |
          cd nextjs
          export NEXT_PUBLIC_BASE_PATH="/kaiyuanguji-web"
          export NEXT_PUBLIC_DATA_SOURCE="github"
          npm run build
          mkdir -p ../build/gh-pages
          cp -r out/* ../build/gh-pages/

      # --- 步骤 2：为 EdgeOne 构建（bundle 模式） ---
      - name: Clone book-index-draft
        run: |
          git clone --depth 1 https://github.com/open-guji/book-index-draft.git book-index-draft

      - name: Bundle data for EdgeOne
        run: |
          cd nextjs
          node scripts/bundle-data.mjs ../book-index-draft

      - name: Verify bundled data
        run: |
          cd nextjs/public/data
          for f in index.json search_s.json resource.json resource-site.json recommended.json; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing $f" && exit 1
            fi
            echo "✓ $f ($(wc -c < "$f") bytes)"
          done
          ls chunks/*.json | wc -l | xargs -I{} echo "✓ {} chunk files"

      - name: Build for EdgeOne
        run: |
          cd nextjs
          rm -rf .next out
          export NEXT_PUBLIC_BASE_PATH=""
          export NEXT_PUBLIC_DATA_SOURCE="bundle"
          npm run build
          mkdir -p ../build/edgeone
          cp -r out/* ../build/edgeone/

      - name: Verify EdgeOne build uses bundle mode
        run: |
          if grep -r '"bundle"' nextjs/out/_next/static/chunks/ > /dev/null 2>&1; then
            echo "✓ EdgeOne build confirmed using bundle mode"
          else
            echo "❌ EdgeOne build not using bundle mode!" && exit 1
          fi

      # --- 步骤 3：部署到 GitHub Pages 分支 ---
      - name: Deploy to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/gh-pages
          branch: gh-pages # 部署到 gh-pages 分支

      # --- 步骤 4：部署到 EdgeOne 分支 ---
      - name: Deploy to EdgeOne Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/edgeone
          branch: edgeone-release # 部署到专门给 EdgeOne 用的分支
